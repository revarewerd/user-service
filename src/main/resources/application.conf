user-service {

  # ============================================================
  # PostgreSQL — пользователи, компании, роли, группы
  # ============================================================
  postgres {
    url = "jdbc:postgresql://localhost:5432/tracker_users"
    url = ${?POSTGRES_URL}
    user = "users"
    user = ${?POSTGRES_USER}
    password = "users_pass"
    password = ${?POSTGRES_PASSWORD}
    max-pool-size = 20
  }

  # ============================================================
  # Redis — кэш прав, профилей, транспортных групп
  # ============================================================
  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
  }

  # ============================================================
  # Кэширование
  # ============================================================
  cache {
    permissions-ttl-seconds = 3600
    profile-ttl-seconds = 300
    groups-ttl-seconds = 3600
  }

  # ============================================================
  # BCrypt — настройки хеширования паролей
  # ============================================================
  bcrypt {
    rounds = 12
  }

  # ============================================================
  # HTTP Сервер
  # ============================================================
  server {
    port = 8091
    port = ${?USER_SERVICE_PORT}
  }
}
